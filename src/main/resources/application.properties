spring.application.name=ai-test-generator

# Ollama Configuration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:3b
spring.ai.ollama.chat.options.num-ctx=32768
spring.ai.ollama.chat.options.num-predict=10240
spring.ai.ollama.chat.options.temperature=0.5
spring.ai.ollama.chat.options.top-p=0.7
spring.ai.ollama.chat.options.repeat-penalty=1.1
spring.ai.ollama.chat.options.stop=[]

# Base URL for testing API (use your own)
api.base.url=https://your-api-domain.com

# OpenAPI file path (place the file in the project root)
openapi.file.path=./api.json

logging.level.org.springframework.ai=DEBUG
logging.level.io.restassured=DEBUG

# Actuator configuration
management.endpoints.web.exposure.include=prometheus,health,metrics
management.prometheus.metrics.export.enabled=true

# Metrics configuration
management.metrics.distribution.percentiles-histogram.all=true
management.metrics.enable.all=true
# Добавляем тег приложения ко всем метрикам
management.metrics.tags.application=${spring.application.name}

# Prometheus Configuration
management.prometheus.metrics.export.step=5s

# Micrometer Tracing for exemplars
management.tracing.sampling.probability=1.0
management.tracing.enabled=true
